name: Update Rankings

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 6am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml pandas numpy scipy

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cricket_cache
          key: cricket-cache-${{ github.run_id }}
          restore-keys: cricket-cache-

      - name: Run update script
        run: python update_rankings.py --scrape

      - name: Patch player roles
        run: python patch_roles.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/rankings.json docs/odi_rankings.json docs/t20i_rankings.json docs/ipl_rankings.json cricket_cache/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update rankings $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Check for Greatest XI changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_xi_changes.py --create-issue
